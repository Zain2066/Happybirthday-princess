<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeeshuVerse ❤️</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="background">
    <div class="stars"></div>
    <div class="gradient"></div>
    <div class="hearts"></div>
</div>

<section id="welcome">

    <h1 class="logo">
        ✨ MeeshuVerse ❤️
    </h1>

    <p class="subtitle">
        A Birthday Universe Created With Love By
        <br>
        <span>Zain ❤️</span>
    </p>

    <div class="glass">

        <h2>
            Are You Really Meeshu? 🥹
        </h2>

        <button id="yes">
            Yes ❤️
        </button>

        <button id="no">
            No 😏
        </button>

        <p id="message"></p>

    </div>

</section>

<section id="portal">

<h1>
🎂 Happy Birthday
</h1>

<h2>
Meeshu ❤️
</h2>

<p>

Someone spent hours creating this little universe...

Just to make you smile.

💖

</p>

<button id="continue">

Enter My Birthday Universe ✨

</button>

</section>
